[build]
  command = "npm run build"
  publish = "dist"

# Static assets - serve with correct headers and caching
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

# Specific file types - ensure they're served with correct MIME types
[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200
  force = true

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200
  force = true

# SPA routing - only for non-asset requests (this should be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}  # This won't match, ensuring it's a fallback

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for different file types
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.razorpay.com https://api.razorpay.com https://checkout.razorpay.com;
      connect-src 'self' https://*.supabase.co https://api.razorpay.com https://*.razorpay.com https://checkout.razorpay.com;
      img-src 'self' data: https: blob:;
      style-src 'self' 'unsafe-inline' https://*.razorpay.com https://checkout.razorpay.com;
      font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.razorpay.com data:;
      frame-src https://*.razorpay.com https://api.razorpay.com https://checkout.razorpay.com;
      object-src 'none';
      form-action 'self' https://*.razorpay.com;
      upgrade-insecure-requests;
      base-uri 'self';
    """
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
