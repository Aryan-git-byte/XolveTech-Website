[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      #— block everything by default, allow only what you list below —
      default-src   'self';

      #— JS your own + Razorpay checkout + future APIs —
      script-src    'self'
                    https://checkout.razorpay.com
                    https://api.razorpay.com;

      #— XHR/WebSocket/fetch to your own + Supabase + Razorpay APIs —
      connect-src   'self'
                    https://*.supabase.co
                    https://api.razorpay.com;

      #— images from your own, inline SVG/data URIs, and any HTTPS host —
      img-src       'self'
                    data:
                    https:;

      #— inline styles (e.g. Razorpay injects them), plus your own CSS files —
      style-src     'self'
                    'unsafe-inline';

      #— load fonts from your own or Google Fonts (if you ever add them) —
      font-src      'self'
                    https://fonts.googleapis.com
                    https://fonts.gstatic.com
                    data:;

      #— embedded frames (e.g. Razorpay checkout iframe) —
      frame-src     https://checkout.razorpay.com
                    https://api.razorpay.com;

      #— no plugin-based objects allowed —
      object-src    'none';

      #— ensure all forms post only to your own or Razorpay —
      form-action   'self'
                    https://checkout.razorpay.com;

      #— block mixed HTTP content on an HTTPS page —
      upgrade-insecure-requests;

      #— restrict the document base URI to self —
      base-uri      'self';
    """
    X-Frame-Options = "SAMEORIGIN"
