[build]
  command = "npm run build"
  publish = "dist"

# SPA routing
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers + cache control
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.razorpay.com https://api.razorpay.com;
      connect-src 'self' https://*.supabase.co https://api.razorpay.com https://*.razorpay.com;
      img-src 'self' data: https:;
      style-src 'self' 'unsafe-inline';
      font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com data:;
      frame-src https://*.razorpay.com https://api.razorpay.com;
      object-src 'none';
      form-action 'self' https://*.razorpay.com;
      upgrade-insecure-requests;
      base-uri 'self';
    """
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache"  # ensures browser fetches fresh index.html

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"  # safely cache hashed assets
